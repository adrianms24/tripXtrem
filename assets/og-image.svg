<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="TripXtrem Open Graph">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative dots pattern -->
  <g fill="#ffffff" opacity=".05">
    <circle cx="100" cy="100" r="3"/>
    <circle cx="200" cy="180" r="2"/>
    <circle cx="350" cy="120" r="2.5"/>
    <circle cx="500" cy="220" r="2"/>
    <circle cx="1050" cy="500" r="3"/>
    <circle cx="950" cy="550" r="2"/>
    <circle cx="1100" cy="420" r="2.5"/>
  </g>

  <!-- Mountain silhouette -->
  <path d="M0 550 L180 380 L320 470 L480 320 L650 440 L820 280 L1000 410 L1200 340 L1200 630 L0 630 Z" fill="#ffffff" opacity=".06"/>

  <!-- Logo mark -->
  <g transform="translate(84, 84)">
    <rect width="90" height="90" rx="20" fill="#111827" stroke="#22c55e" stroke-width="2"/>
    <path d="M26 26 L64 64" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <path d="M64 26 L26 64" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <circle cx="45" cy="45" r="4" fill="#22c55e"/>
  </g>
  <text x="200" y="145" font-family="'Syne','Arial Black',sans-serif" font-weight="900" font-size="44" fill="#ffffff" letter-spacing="-1">Trip<tspan fill="#22c55e">X</tspan>trem</text>

  <!-- Eyebrow -->
  <g transform="translate(84, 240)">
    <rect width="280" height="36" rx="18" fill="#22c55e" opacity=".15"/>
    <text x="20" y="24" font-family="'Outfit',sans-serif" font-weight="700" font-size="14" fill="#22c55e" letter-spacing="1.5">🏆 MARKETPLACE Nº1 ESPAÑA</text>
  </g>

  <!-- Headline -->
  <text x="84" y="360" font-family="'Syne','Arial Black',sans-serif" font-weight="900" font-size="72" fill="#ffffff" letter-spacing="-2">Deja de soñarlo.</text>
  <text x="84" y="440" font-family="'Syne','Arial Black',sans-serif" font-weight="900" font-size="72" fill="#22c55e" letter-spacing="-2">Resérvalo hoy.</text>

  <!-- Subhead -->
  <text x="84" y="492" font-family="'Outfit',sans-serif" font-weight="500" font-size="24" fill="#94a3b8">Surf · Kitesurf · Paracaidismo · Parapente · Rafting</text>

  <!-- Stats row -->
  <g transform="translate(84, 540)" font-family="'Outfit',sans-serif" fill="#ffffff">
    <text font-weight="800" font-size="18">⭐ 4.9/5</text>
    <text x="140" font-weight="800" font-size="18">🏆 +1.800 grupos</text>
    <text x="360" font-weight="800" font-size="18">🛡️ Seguro incluido</text>
    <text x="610" font-weight="800" font-size="18">⚡ Confirmación &lt;2h</text>
  </g>

  <!-- URL bottom right -->
  <text x="1116" y="590" font-family="'Outfit',sans-serif" font-weight="600" font-size="18" fill="#94a3b8" text-anchor="end">tripxtrem.com</text>
</svg>
